<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Marlon Samuel - Sobre</title>
    <link rel="icon" href="/assets/images/favicon/favicon.ico" sizes="any">
    <link rel="apple-touch-icon" href="/assets/images/favicon/apple-touch-icon.png">
    <link rel="stylesheet" sizes="96x96" href="/assets/images/favicon/favicon-96x96.png">
    <link rel="stylesheet" sizes="192x192" href="/assets/images/favicon/web-app-manifest-192x192.png">
    <link rel="stylesheet" sizes="512x512" href="/assets/images/favicon/web-app-manifest-512x512.png">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css" />
    <link rel="stylesheet" href="/css/reset.css">
    <link rel="stylesheet" href="/css/variables.css">
    <link rel="stylesheet" href="/css/base.css">
    <link rel="stylesheet" href="/css/layout.css">
    <link rel="stylesheet" href="/css/pages/about.css">
    <link rel="stylesheet" href="/css/animations.css">
    <script defer src="https://cloud.umami.is/script.js"
        data-website-id="1ac6eaee-8a1a-48ba-b2e2-99d903032dd6"></script>
</head>

<body>
    <div id="header"></div>
    <main class="about-page">
        <section class="about-hero">
            <div class="hero-avatar">
                <img src="/assets/images/Marlon.jpeg" data-i18n-attr="alt:aboutAvatarAlt">
            </div>

            <h1 data-i18n="heroTitle"></h1>
            <span class="hero-role" data-i18n="aboutRole"></span>

            <p class="hero-text" data-i18n="aboutHeroText"></p>

            <div class="hero-socials">
                <a ... data-i18n-attr="aria-label:ariaGithub"></a>
                <a ... data-i18n-attr="aria-label:ariaLinkedin"></a>
                <a ... data-i18n-attr="aria-label:ariaEmail"></a>
            </div>
        </section>

        <div class="section-divider">
            <span></span>
            <span></span>
            <span></span>
        </div>


        <section class="about-timeline fade-in">
            <h2 class="section-title" data-i18n="aboutHistoryTitle"></h2>

            <div class="timeline">
                <div class="timeline-line"></div>

                <div class="timeline-item left fade-in fade-delay-1">
                    <h3 data-i18n="timeline1Title"></h3>
                    <p data-i18n="timeline1Text"></p>
                </div>

                <div class="timeline-item right fade-in fade-delay-2">
                    <h3 data-i18n="timeline2Title"></h3>
                    <p data-i18n="timeline2Text"></p>
                </div>

                <div class="timeline-item left fade-in fade-delay-3">
                    <h3 data-i18n="timeline3Title"></h3>
                    <p data-i18n="timeline3Text"></p>
                </div>

                <div class="timeline-item right fade-in fade-delay-4">
                    <h3 data-i18n="timeline4Title"></h3>
                    <p data-i18n="timeline4Text"></p>
                </div>
            </div>
        </section>

        <div class="section-divider">
            <span></span>
            <span></span>
            <span></span>
        </div>


        <section class="about-mindset fade-in">
            <h2 class="section-title" data-i18n="aboutMindsetTitle"></h2>

            <div class="mindset-grid">
                <div class="mindset-card fade-in fade-delay-1">
                    <div class="card-icon">
                        <i class="fa-solid fa-lightbulb"></i>
                    </div>
                    <h3 data-i18n="mindset1Title"></h3>
                    <p data-i18n="mindset1Text"></p>
                </div>

                <div class="mindset-card fade-in fade-delay-2">
                    <div class="card-icon">
                        <i class="fa-solid fa-layer-group"></i>
                    </div>
                    <h3 data-i18n="mindset2Title"></h3>
                    <p data-i18n="mindset2Text"></p>
                </div>

                <div class="mindset-card fade-in fade-delay-3">
                    <div class="card-icon">
                        <i class="fa-solid fa-rocket"></i>
                    </div>
                    <h3 data-i18n="mindset3Title"></h3>
                    <p data-i18n="mindset3Text"></p>
                </div>
            </div>
        </section>

        <div class="section-divider">
            <span></span>
            <span></span>
            <span></span>
        </div>


        <section class="text">
            <p class="hero-text" data-i18n="aboutFinalText"></p>
        </section>

        <section class="about-footer">
            <div class="hero-socials">
                <a href="https://github.com/marlon1402" target="_blank" aria-label="Github"
                    data-umami-event="social-github"><i class="fa-brands fa-github"></i></a>
                <a href="https://www.linkedin.com/in/marlonsamuel1402/" target="_blank" aria-label="Linkedin"
                    data-umami-event="social-linkedin"><i class="fa-brands fa-linkedin"></i></a>
                <a href="mailto:marlonsamuel.dev@gmail.com" target="_blank" aria-label="Email"
                    data-umami-event="social-email"><i class="fa-solid fa-envelope"></i></a>
            </div>
        </section>
    </main>
</body>
<script src="/js/components.js"></script>
<script src="/js/scroll-animations.js"></script>
<script src="/js/theme.js" defer></script>
<script src="/js/lang.js" defer></script>

</html>
