<header class="header">

    <!-- LOGO -->
    <a href="/" data-umami-event="nav-home" data-i18n="navHome"></a>

    <!-- 🔥 BOTÃO MOBILE -->
    <button class="menu-toggle" id="menuToggle" aria-label="Menu">
        <span></span>
        <span></span>
        <span></span>
    </button>

    <!-- CONTROLES -->
    <div class="header-controls" id="headerControls">

        <!-- Idioma -->
        <div class="lang-wrapper" id="langWrapper">
            <button class="lang-btn" id="langBtn" aria-haspopup="listbox" aria-expanded="false"
                data-i18n-attr="aria-label:ariaSelectLanguage">

                <span class="lang-flag" id="activeLangFlag">🇧🇷</span>
                <span class="lang-code" id="activeLangCode">PT</span>
                <i class="fa-solid fa-chevron-down lang-chevron"></i>
            </button>

            <div class="lang-dropdown" id="langDropdown" role="listbox">
                <button class="lang-option active" data-lang="PT">🇧🇷 Português</button>
                <button class="lang-option" data-lang="EN">🇺🇸 English</button>
            </div>
        </div>

        <!-- Tema -->
        <button class="theme-switch" id="themeSwitch" role="switch">
            <span class="switch-knob">
                <svg id="themeIcon" viewBox="0 0 24 24"></svg>
            </span>
        </button>

        <div class="header-divider"></div>

        <!-- Links -->
        <a href="/links/" class="header-links" data-i18n="navLinks"></a>
    </div>

</header>
